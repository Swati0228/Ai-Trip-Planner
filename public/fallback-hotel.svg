<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="hotel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#hotel-grad)" />
  <rect width="400" height="300" fill="url(#grid)" />
  
  <!-- Hotel Icon -->
  <g transform="translate(200, 130)" text-anchor="middle" fill="white">
    <!-- Hotel Building Silhouette -->
    <path d="M-30,40 L-30,-40 L0,-55 L30,-40 L30,40 Z" fill="none" stroke="white" stroke-width="3" />
    
    <!-- Windows -->
    <rect x="-18" y="-25" width="8" height="8" rx="1" fill="white" opacity="0.8" />
    <rect x="10" y="-25" width="8" height="8" rx="1" fill="white" opacity="0.8" />
    <rect x="-18" y="-10" width="8" height="8" rx="1" fill="white" opacity="0.8" />
    <rect x="10" y="-10" width="8" height="8" rx="1" fill="white" opacity="0.8" />
    <rect x="-18" y="5" width="8" height="8" rx="1" fill="white" opacity="0.8" />
    <rect x="10" y="5" width="8" height="8" rx="1" fill="white" opacity="0.8" />
    
    <!-- Door -->
    <path d="M-6,40 L-6,24 L6,24 L6,40 Z" fill="white" />
    
    <!-- Stars (Hotel rating style) -->
    <g transform="translate(0, -75)" fill="#FBBF24">
      <polygon points="0,-7 2,-2 7,-2 3,1 5,6 0,3 -5,6 -3,1 -7,-2 -2,-2" />
      <polygon points="-15,-5 -13,0 -8,0 -12,3 -10,8 -15,5 -20,8 -18,3 -22,0 -17,0" transform="scale(0.8) translate(-5, 0)" />
      <polygon points="15,-5 17,0 22,0 18,3 20,8 15,5 10,8 12,3 8,0 13,0" transform="scale(0.8) translate(5, 0)" />
    </g>
    
    <text x="0" y="75" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="600" letter-spacing="0.5">RECOMMENDED HOTEL</text>
    <text x="0" y="95" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" opacity="0.7">Cozy stays awaits you</text>
  </g>
</svg>
